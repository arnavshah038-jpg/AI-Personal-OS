services:

  postgres:
    image: postgres:16
    container_name: ai-pos-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5


  redis:
    image: redis:7-alpine
    container_name: ai-pos-redis
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5


  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-pos-qdrant
    restart: unless-stopped

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - qdrant_data:/qdrant/storage


  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend

    container_name: ai-pos-backend
    restart: unless-stopped

    env_file:
      - .env

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

      qdrant:
        condition: service_started


    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333


    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000


  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend

    container_name: ai-pos-frontend
    restart: unless-stopped

    env_file:
      - .env

    depends_on:
      backend:
        condition: service_started


    ports:
      - "8501:8501"


    command: >
      streamlit run frontend/dashboard.py
      --server.address=0.0.0.0
      --server.port=8501



volumes:
  postgres_data:
  qdrant_data: